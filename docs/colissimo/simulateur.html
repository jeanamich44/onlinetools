<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Simulateur de Tarifs – Colissimo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/font-awesome.min.css">
    <style>
        :root {
            --colissimo-orange: #F37021;
            --colissimo-indigo: #2E3192;
            --bg-dark: #1f242d;
            --bg-card: #2a2f3a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --error-red: #ff4444;
        }

        .simulator-container {
            max-width: 800px;
            margin: 20px auto;
            background: var(--bg-dark);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            color: var(--colissimo-orange);
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 1px solid #2a2f3a;
            padding-bottom: 5px;
            grid-column: span 2;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .results-container {
            margin-top: 30px;
            display: none;
        }

        .offer-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--colissimo-orange);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .offer-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .offer-info h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #fff;
        }

        .offer-info p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .offer-price {
            text-align: right;
        }

        .price-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--colissimo-orange);
            display: block;
        }

        #loader {
            display: none;
            text-align: center;
            padding: 30px;
        }

        input,
        select {
            background: #2a2f3a;
            border: 1px solid #3d4451;
            color: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            box-sizing: border-box;
            height: 48px;
        }

        input:focus,
        select:focus {
            border-color: var(--colissimo-orange);
            box-shadow: 0 0 0 2px rgba(243, 112, 33, 0.2);
        }

        .btn-colissimo {
            background: linear-gradient(135deg, var(--colissimo-orange), #ff9d6c);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(243, 112, 33, 0.3);
        }

        .btn-colissimo:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(243, 112, 33, 0.5);
            background: linear-gradient(135deg, #ff9d6c, var(--colissimo-orange));
        }

        .btn-colissimo:active {
            transform: scale(0.95);
        }

        .validation-error-msg {
            color: var(--error-red);
            font-size: 0.75rem;
            margin-top: 4px;
            display: block;
            font-weight: 500;
        }

        input.input-invalid {
            border-color: var(--error-red) !important;
        }

        .searchable-select {
            position: relative;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #2a2f3a;
            border: 1px solid var(--colissimo-orange);
            border-top: none;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            display: none;
        }

        .search-item {
            padding: 10px 15px;
            cursor: pointer;
            color: #fff;
            transition: background 0.2s;
        }

        .search-item:hover {
            background: var(--colissimo-orange);
        }

        .error-container {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--error-red);
            color: var(--error-red);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .section-title {
                grid-column: span 1;
            }

            .offer-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }
    </style>
</head>

<body class="colissimo-page">
    <header class="header">
        <div class="header-inner">
            <a href="../index.html" class="logo">ChezRheyy</a>
            <nav class="nav">
                <a href="../index.html">Home</a>
                <a href="colissimo-liste.html">Colissimo</a>
            </nav>
        </div>
    </header>

    <main class="content">
        <section class="intro">
            <div style="display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px;">
                <i class="fas fa-box-open" style="font-size: 50px; color: var(--colissimo-orange);"></i>
                <h1>Simulateur Colissimo</h1>
            </div>
            <p style="text-align: center;">Estimez instantanément le prix de vos envois Colissimo.</p>
        </section>

        <div class="simulator-container">
            <div id="simulatorError" class="error-container">
                <i class="fas fa-exclamation-circle"></i>
                <span class="error-text">Une erreur est survenue.</span>
            </div>
            <form id="colissimoSimulator" novalidate>
                <div class="form-grid">
                    <div class="section-title"><i class="fas fa-paper-plane"></i> Départ</div>
                    <select name="sender_iso" required style="grid-column: span 2;">
                        <option value="FR">FRANCE</option>
                        <option value="AD">ANDORRE</option>
                        <option value="GP">GUADELOUPE</option>
                        <option value="GF">GUYANE FRANÇAISE</option>
                        <option value="MQ">MARTINIQUE</option>
                        <option value="YT">MAYOTTE</option>
                        <option value="MC">MONACO</option>
                        <option value="RE">RÉUNION</option>
                        <option value="BL">SAINT BARTHÉLEMY</option>
                        <option value="MF">SAINT MARTIN (FR)</option>
                    </select>
                    <input type="text" name="sender_zip" placeholder="Code Postal" required
                        pattern="[a-zA-Z0-9\s-]{1,10}" maxlength="10">
                    <input type="text" name="sender_city" placeholder="Ville" required>

                    <div class="section-title"><i class="fas fa-map-marker-alt"></i> Destination</div>
                    <div class="searchable-select" style="grid-column: span 2;">
                        <input type="text" id="destinationSearch" placeholder="Rechercher un pays..." required
                            autocomplete="off">
                        <input type="hidden" name="recipient_iso" id="recipientCountryHidden" value="FR">
                        <div id="destinationResults" class="search-results"></div>
                    </div>
                    <input type="text" name="recipient_zip" placeholder="Code Postal" required
                        pattern="[a-zA-Z0-9\s-]{1,10}" maxlength="10">
                    <input type="text" name="recipient_city" placeholder="Ville" required>
                    <select name="product_code" id="productCodeSelector" required style="grid-column: span 2;">
                    </select>

                    <div class="section-title"><i class="fas fa-cog"></i> Options d'envoi</div>
                    <select name="shipping_mode" required>
                        <option value="BDP">Dépôt en Bureau de Poste / Point Relais</option>
                        <option value="BAL">Enlèvement en Boîte aux Lettres</option>
                    </select>
                    <select name="package_format" required>
                        <option value="STND">Format Standard (Colis < 150cm)</option>
                        <option value="VOL">Format Volumineux (150cm < Colis < 200cm)</option>
                    </select>

                    <div class="section-title"><i class="fas fa-box"></i> Caractéristiques</div>
                    <div style="position: relative;">
                        <input type="number" name="weight" id="weightInput" step="0.01" placeholder="Poids (kg)"
                            required min="0.1" max="30">
                        <small id="weightGrams"
                            style="display: block; margin-top: 5px; color: var(--text-muted); font-size: 0.8rem;">soit 0
                            grammes</small>
                    </div>
                    <div style="position: relative;">
                        <input type="date" name="shipping_date" id="shippingDate">
                    </div>
                </div>

                <button type="submit" class="btn-colissimo">
                    <i class="fas fa-calculator"></i> Simuler le prix
                </button>
            </form>

            <div id="loader">
                <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--colissimo-orange);"></i>
                <p style="margin-top: 15px; color: var(--text-muted);">Consultation des tarifs Colissimo...</p>
            </div>

            <div id="results" class="results-container">
                <h2 style="font-size: 1.2rem; margin-bottom: 20px; color: #fff;">Meilleure offre trouvée :</h2>
                <div id="offersList"></div>
            </div>
        </div>

        <a class="back" href="colissimo-liste.html">Retour à la liste</a>
    </main>

    <script src="../js/chronopost-autocomplete.js"></script>
    <script>
        const form = document.getElementById('colissimoSimulator');
        const results = document.getElementById('results');
        const offersList = document.getElementById('offersList');
        const loader = document.getElementById('loader');
        const destSearch = document.getElementById('destinationSearch');
        const destResults = document.getElementById('destinationResults');
        const destHidden = document.getElementById('recipientCountryHidden');
        const productSelector = document.getElementById('productCodeSelector');
        let COUNTRY_LIST = {};

        async function loadCountries() {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all?fields=name,cca2,translations');
                const data = await response.json();
                data.forEach(country => {
                    const nameFR = country.translations.fra ? country.translations.fra.common.toUpperCase() : country.name.common.toUpperCase();
                    COUNTRY_LIST[nameFR] = country.cca2;
                });
            } catch (err) {
                COUNTRY_LIST = { 
                    "FRANCE": "FR", "BELGIQUE": "BE", "SUISSE": "CH", "LUXEMBOURG": "LU", 
                    "ALLEMAGNE": "DE", "ESPAGNE": "ES", "ITALIE": "IT", "PORTUGAL": "PT", 
                    "PAYS-BAS": "NL", "AUTRICHE": "AT" 
                };
            }
        }

        const OM_COUNTRIES = ['GP', 'GF', 'MQ', 'YT', 'RE', 'BL', 'MF', 'PM', 'WF', 'NC', 'PF'];

        function updateProductChoices(iso) {
            productSelector.innerHTML = '';
            let options = [];

            if (iso === 'FR' || iso === 'MC' || iso === 'AD') {
                options = [
                    { val: 'DOM', label: 'Colissimo France - Domicile (sans signature)' },
                    { val: 'DOS', label: 'Colissimo France - Domicile (avec signature)' },
                    { val: 'COL', label: 'Colissimo France - Point Retrait (Relais/Consigne)' },
                    { val: 'BPR', label: 'Colissimo France - Bureau de Poste' }
                ];
            } else if (OM_COUNTRIES.includes(iso)) {
                options = [
                    { val: 'COM', label: 'Colissimo Outre-Mer - Domicile (sans signature)' },
                    { val: 'CDS', label: 'Colissimo Outre-Mer - Domicile (avec signature)' }
                ];
            } else {
                options = [
                    { val: 'COLI', label: 'Colissimo International (Domicile)' },
                    { val: 'CORI', label: 'Colissimo International (Relais)' }
                ];
            }

            options.forEach(opt => {
                const o = document.createElement('option');
                o.value = opt.val;
                o.textContent = opt.label;
                productSelector.appendChild(o);
            });
        }


        updateProductChoices('FR');


        document.getElementById('shippingDate').value = new Date().toISOString().split('T')[0];


        const weightInput = document.getElementById('weightInput');
        const weightGrams = document.getElementById('weightGrams');
        weightInput.addEventListener('input', () => {
            const kg = parseFloat(weightInput.value) || 0;
            weightGrams.textContent = `soit ${(kg * 1000).toLocaleString()} grammes`;
        });

        loadCountries();


        destSearch.addEventListener('input', (e) => {
            const val = e.target.value.toUpperCase();
            destResults.innerHTML = '';
            if (val.length > 0) {
                const filtered = Object.keys(COUNTRY_LIST).filter(c => c.includes(val)).slice(0, 8);
                if (filtered.length > 0) {
                    destResults.style.display = 'block';
                    filtered.forEach(countryName => {
                        const div = document.createElement('div');
                        div.className = 'search-item';
                        div.textContent = countryName;
                        div.onclick = () => {
                            destSearch.value = countryName;
                            const iso = COUNTRY_LIST[countryName];
                            destHidden.value = iso;
                            destResults.style.display = 'none';
                            updateProductChoices(iso);
                        };
                        destResults.appendChild(div);
                    });
                } else {
                    destResults.style.display = 'none';
                }
            } else {
                destResults.style.display = 'none';
            }
        });

        document.addEventListener('click', (e) => {
            if (!destSearch.contains(e.target) && !destResults.contains(e.target)) {
                destResults.style.display = 'none';
            }
        });


        const validateField = (input) => {
            const isValid = input.checkValidity();
            let errorSpan = input.parentNode.querySelector('.validation-error-msg');

            if (!isValid) {
                input.classList.add('input-invalid');
                if (!errorSpan) {
                    errorSpan = document.createElement('span');
                    errorSpan.className = 'validation-error-msg';
                    input.parentNode.appendChild(errorSpan);
                }
                errorSpan.textContent = input.validationMessage;
            } else {
                input.classList.remove('input-invalid');
                if (errorSpan) errorSpan.remove();
            }
            return isValid;
        };

        form.querySelectorAll('input, select').forEach(inp => {
            inp.addEventListener('input', () => validateField(inp));
            inp.addEventListener('blur', () => validateField(inp));
        });


        form.onsubmit = async (e) => {
            e.preventDefault();

            const inputs = form.querySelectorAll('input[required]');
            let isFormValid = true;
            inputs.forEach(inp => { if (!validateField(inp)) isFormValid = false; });
            if (!isFormValid) return;

            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            if (data.weight) data.weight = parseFloat(data.weight);
            
            if (data.recipient_iso !== 'FR') {
                delete data.shipping_mode; 
                delete data.package_format;
            }

            const showError = (msg) => {
                const errorDiv = document.getElementById('simulatorError');
                errorDiv.querySelector('.error-text').textContent = msg;
                errorDiv.style.display = 'flex';
                window.scrollTo({ top: errorDiv.offsetTop - 100, behavior: 'smooth' });
            };

            const hideError = () => {
                document.getElementById('simulatorError').style.display = 'none';
            };

            results.style.display = 'none';
            hideError();
            loader.style.display = 'block';
            offersList.innerHTML = '';

            try {
                const response = await fetch('https://transporteur.up.railway.app/api/colissimo/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) throw new Error('Erreur serveur API');

                const json = await response.json();

                if (json.status === 'success') {
                    const card = document.createElement('div');
                    card.className = 'offer-card';
                    card.innerHTML = `
                        <div class="offer-info">
                            <h3>${json.label || 'Offre Colissimo'}</h3>
                            <p><i class="fas fa-calendar-alt"></i> Livraison estimée : ${json.delivery_date || 'N/C'}</p>
                            <p><i class="fas fa-info-circle"></i> Service officiel Colissimo</p>
                        </div>
                        <div class="offer-price">
                            <span class="price-value">${json.price.toFixed(2)} €</span>
                        </div>
                    `;
                    offersList.appendChild(card);
                    results.style.display = 'block';
                } else {
                    const errorMsg = json.message || 'Impossible de calculer le tarif pour cette destination ou ce poids.';
                    showError(errorMsg);
                }
            } catch (err) {
                console.error(err);
                showError('Une erreur technique est survenue lors de la connexion au serveur.');
            } finally {
                loader.style.display = 'none';
            }
        };
    </script>
</body>

</html>
