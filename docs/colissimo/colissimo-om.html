<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Colissimo Outre-Mer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div id="overlay" style="flex-direction: column; gap: 20px;">
        <div class="spinner"></div>
        <div id="timerContainer" style="display:none; text-align: center; color: #fff;">
            <span style="font-size: 1.2rem; font-weight: bold;" id="timer">00:00</span>
            <span class="info-icon" style="margin-left: 10px; vertical-align: middle;"
                data-tooltip="La génération est en cours. Veuillez patienter quelques instants.">i</span>
        </div>
    </div>

    <div id="statusMessage" style="position:fixed; top:80px; width:100%; text-align:center; z-index:900;"></div>

    <header class="header">
        <div class="header-inner">
            <a href="../index.html" class="logo">ChezRheyy</a>
            <nav class="nav">
                <a href="../index.html">Home</a>
                <a href="../contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main class="content form-container">

        <h1 class="page-title">Colissimo Outre-Mer - Domicile</h1>

        <form id="colissimoForm" onsubmit="handleSubmit(event)" novalidate>
            <input type="hidden" name="productCode" value="DOS">

            <div class="sections-grid">

                <div class="form-section">
                    <div class="section-header">
                        <span>
                            <span class="section-number">1</span> Expéditeur
                        </span>
                        <span>FRANCE</span>
                    </div>
                    <div class="section-content">
                        <div class="radio-group" style="margin-bottom: 20px;">
                            <label>Type *</label>
                            <label><input type="radio" name="senderType" value="0"> Professionnel</label>
                            <label><input type="radio" name="senderType" value="1" checked> Particulier</label>
                        </div>

                        <div class="form-group" id="senderCompanyDiv" style="display:none;">
                            <label>Nom de société</label>
                            <input type="text" name="senderCompanyName" placeholder="Optionnel" maxlength="60">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Nom</label>
                                <input type="text" name="senderLastname" placeholder="Nom" maxlength="60">
                            </div>
                            <div class="form-group">
                                <label>Prénom</label>
                                <input type="text" name="senderFirstname" placeholder="Prénom" maxlength="60">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>E-mail</label>
                                <input type="email" name="senderEmail" placeholder="votre@email.com" maxlength="60">
                            </div>
                            <div class="form-group">
                                <label>Téléphone</label>
                                <input type="tel" name="senderPhone" placeholder="06..." maxlength="14">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Code Postal</label>
                                <input type="text" name="senderCP" required pattern="\d+" maxlength="10">
                            </div>
                            <div class="form-group">
                                <label>Ville</label>
                                <input type="text" name="senderCity" required maxlength="60">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Adresse</label>
                            <input type="text" name="senderAddress" required maxlength="100">
                        </div>
                        <div class="form-group">
                            <label>Complément adresse</label>
                            <input type="text" name="senderAddress2" placeholder="Bâtiment, étage..." maxlength="60">
                        </div>

                        <input type="hidden" name="senderCountry" value="FR">
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-header">
                        <span><span class="section-number">2</span> Destinataire</span>
                        <span>OUTRE-MER</span>
                    </div>
                    <div class="section-content">
                        <div class="radio-group" style="margin-bottom: 20px;">
                            <label>Type *</label>
                            <label><input type="radio" name="receiverType" value="0"> Professionnel</label>
                            <label><input type="radio" name="receiverType" value="1" checked> Particulier</label>
                        </div>

                        <div class="form-group" style="margin-bottom: 20px;">
                            <label>Territoire *</label>
                            <select name="receiverCountry" required>
                                <option value="GP">Guadeloupe</option>
                                <option value="MQ">Martinique</option>
                                <option value="GF">Guyane</option>
                                <option value="RE">La Réunion</option>
                                <option value="YT">Mayotte</option>
                                <option value="PM">St Pierre & Miquelon</option>
                                <option value="NC">Nouvelle-Calédonie</option>
                                <option value="PF">Polynésie Française</option>
                            </select>
                        </div>

                        <div class="form-group" id="receiverCompanyDiv" style="display:none;">
                            <label>Nom de société</label>
                            <input type="text" name="receiverCompanyName" placeholder="Optionnel" maxlength="60">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Nom *</label>
                                <input type="text" name="receiverLastname" required maxlength="60">
                            </div>
                            <div class="form-group">
                                <label>Prénom *</label>
                                <input type="text" name="receiverFirstname" required maxlength="60">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>E-mail *</label>
                                <input type="email" name="receiverEmail" required placeholder="client@email.com"
                                    maxlength="60">
                            </div>
                            <div class="form-group">
                                <label>Téléphone *</label>
                                <input type="tel" name="receiverPhone" required placeholder="06..." maxlength="14">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Code Postal *</label>
                                <input type="text" name="receiverCP" required pattern="\d+" maxlength="10">
                            </div>
                            <div class="form-group">
                                <label>Ville *</label>
                                <input type="text" name="receiverCity" required maxlength="60">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Adresse *</label>
                            <input type="text" name="receiverAddress" required maxlength="100">
                        </div>
                        <div class="form-group">
                            <label>Complément adresse</label>
                            <input type="text" name="receiverAddress2" placeholder="Bâtiment, étage..." maxlength="60">
                        </div>

                    </div>
                </div>
            </div>

            <div class="sections-grid">

                <div class="form-section">
                    <div class="section-header">
                        <span><span class="section-number">3</span> Colis & Référence</span>
                    </div>
                    <div class="section-content">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Poids (kg) *</label>
                                <input type="number" name="packageWeight" required step="0.1" placeholder="Ex: 1.5"
                                    min="0.1" max="30">
                            </div>
                            <div class="form-group">
                                <label>Date d'envoi</label>
                                <input type="date" name="shippingDate" id="shippingDate">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Référence Interne (Optionnel)</label>
                            <input type="text" name="orderNumber" placeholder="Ex: CMD-1234" maxlength="30">
                        </div>
                    </div>
                </div>
            </div>

            <div class="sections-grid" style="margin-top:20px;">
                <div class="form-section">
                    <div class="section-header">
                        <span><span class="section-number">4</span> Déclaration Douanière (CN23)</span>
                    </div>
                    <div class="section-content">
                        <div class="form-group">
                            <label>Description du contenu *</label>
                            <input type="text" name="customsDesc" required maxlength="50"
                                placeholder="Ex: Cadeaux, Vêtements...">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Quantité *</label>
                                <input type="number" name="customsQty" required value="1" min="1">
                            </div>
                            <div class="form-group">
                                <label>Valeur Totale (€) *</label>
                                <input type="number" name="customsValue" required value="10" min="1" step="0.5">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Poids du contenu (kg) *</label>
                                <input type="number" name="customsWeight" required step="0.1" value="1.0" min="0.1">
                            </div>
                            <div class="form-group">
                                <label>Catégorie</label>
                                <select name="customsCategory">
                                    <option value="1">Cadeau</option>
                                    <option value="6">Vente de marchandises</option>
                                    <option value="2">Échantillon commercial</option>
                                    <option value="3">Document</option>
                                    <option value="4">Autre</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Code Douanier / SH (Optionnel)</label>
                            <input type="text" name="customsHsCode" placeholder="Ex: 610910" maxlength="10">
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-bar" style="margin-top:20px;">
                <button type="submit" class="btn-premium-payment" id="btn-validate">
                    <span>Valider et Payer le Bordereau (1€)</span>
                </button>
            </div>

            <div id="message"></div>

        </form>

        <script src="../js/chronopost-autocomplete-world.js"></script>
        <a class="back" href="./colissimo-liste.html">Retour</a>
    </main>

    <script>
        const DEFAULT_SENDER = {
            lastname: "Dupont",
            firstname: "Jean",
            cp: "75001",
            city: "Paris",
            address: "10 rue de la Paix"
        };

        function fillDefaultSender() {
            document.querySelector('input[name="senderLastname"]').value = DEFAULT_SENDER.lastname;
            document.querySelector('input[name="senderFirstname"]').value = DEFAULT_SENDER.firstname;
            document.querySelector('input[name="senderCP"]').value = DEFAULT_SENDER.cp;
            document.querySelector('input[name="senderCity"]').value = DEFAULT_SENDER.city;
            document.querySelector('input[name="senderAddress"]').value = DEFAULT_SENDER.address;
        }

        async function handleSubmit(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            if (data.customsDesc) {
                data.customs = {
                    includeCustomsDeclarations: 1,
                    contents: {
                        article: [{
                            description: data.customsDesc,
                            quantity: parseInt(data.customsQty || 1),
                            weight: parseFloat(data.customsWeight || data.packageWeight),
                            value: parseFloat(data.customsValue || 10),
                            originCountry: "FR",
                            currency: "EUR",
                            hsCode: data.customsHsCode || "000000"
                        }],
                        category: {
                            value: parseInt(data.customsCategory || 1)
                        }
                    }
                };
            }

            const statusDiv = document.getElementById('message');
            const overlay = document.getElementById('overlay');
            const btn = document.getElementById('btn-validate');

            statusDiv.innerHTML = "";
            statusDiv.className = "";

            let firstInvalid = null;
            form.querySelectorAll('input, select, textarea').forEach(input => {
                if (input.hasAttribute('required') || input.hasAttribute('pattern')) {
                    const isValid = input.checkValidity();
                    let errorSpan = input.parentNode.querySelector('.validation-error-msg');

                    if (!isValid) {
                        input.classList.add('input-invalid');
                        if (!errorSpan) {
                            errorSpan = document.createElement('span');
                            errorSpan.className = 'validation-error-msg';
                            input.parentNode.appendChild(errorSpan);
                        }
                        errorSpan.textContent = input.validationMessage;
                        if (!firstInvalid) firstInvalid = input;
                    } else {
                        input.classList.remove('input-invalid');
                        if (errorSpan) errorSpan.remove();
                    }
                }
            });

            if (firstInvalid) {
                firstInvalid.focus();
                return;
            }

            localStorage.setItem('colissimoData', JSON.stringify(data));

            statusDiv.textContent = "Préparation du paiement...";
            btn.disabled = true;
            overlay.style.visibility = 'visible';

            try {
                const API_BASE_PAY = "https://generate-docs-production.up.railway.app";
                const res = await fetch(`${API_BASE_PAY}/create-payment?product_name=colissimo-om`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        type_pdf: "colissimo",
                        ...data
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || "Erreur lors de la création du paiement");
                }

                const result = await res.json();
                if (result.payment_url) {
                    window.location.href = result.payment_url;
                } else {
                    throw new Error("Pas d'URL de paiement reçue");
                }
            } catch (error) {
                statusDiv.innerHTML = "<span class='error-message'>❌ Erreur: " + error.message + "</span>";
                btn.disabled = false;
                overlay.style.visibility = 'hidden';
            }
        }

        async function performGeneration(data) {
            const statusDiv = document.getElementById('message');
            const overlay = document.getElementById('overlay');
            const btn = document.getElementById('btn-validate');

            statusDiv.textContent = "Génération de l'étiquette...";
            overlay.style.visibility = 'visible';
            btn.disabled = true;

            try {
                const response = await fetch('https://transporteur.up.railway.app/generate/colissimo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: data })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    statusDiv.innerHTML = "<span class='success-message'>✅ Génération réussie !</span>";
                    if (result.label) {
                        const link = document.createElement("a");
                        link.href = `data:application/pdf;base64,${result.label}`;
                        link.download = `etiquette_expert_${result.parcelNumber || 'test'}.pdf`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }
                } else {
                    statusDiv.innerHTML = "<span class='error-message'>❌ Erreur: " + (result.message || "Erreur serveur") + "</span>";
                }
            } catch (error) {
                statusDiv.innerHTML = "<span class='error-message'>❌ Erreur réseau ou serveur.</span>";
            } finally {
                overlay.style.visibility = 'hidden';
                btn.disabled = false;
            }
        }

        function setupVisibilityToggle(radioName, divId) {
            const radios = document.getElementsByName(radioName);
            const targetDiv = document.getElementById(divId);

            if (!targetDiv) return;

            function update() {
                const checked = document.querySelector(`input[name="${radioName}"]:checked`);
                if (checked) {
                    targetDiv.style.display = (checked.value === "0") ? "block" : "none";
                }
            }

            radios.forEach(r => r.addEventListener('change', update));
            update();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('success')) {
                const savedData = localStorage.getItem('colissimoData');
                if (savedData) {
                    const data = JSON.parse(savedData);
                    localStorage.removeItem('colissimoData');
                    performGeneration(data);
                }
            }

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('shippingDate').value = today;

            setupVisibilityToggle('senderType', 'senderCompanyDiv');
            setupVisibilityToggle('receiverType', 'receiverCompanyDiv');

            fillDefaultSender();
        });
    </script>
</body>

</html>
