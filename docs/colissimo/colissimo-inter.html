    <script>
        const DEFAULT_SENDER = {
            lastname: "Dupont",
            firstname: "Jean",
            cp: "75001",
            city: "Paris",
            address: "10 rue de la Paix"
        };

        function fillDefaultSender() {
            document.querySelector('input[name="senderLastname"]').value = DEFAULT_SENDER.lastname;
            document.querySelector('input[name="senderFirstname"]').value = DEFAULT_SENDER.firstname;
            document.querySelector('input[name="senderCP"]').value = DEFAULT_SENDER.cp;
            document.querySelector('input[name="senderCity"]').value = DEFAULT_SENDER.city;
            document.querySelector('input[name="senderAddress"]').value = DEFAULT_SENDER.address;
        }

        async function handleSubmit(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            const statusDiv = document.getElementById('message');
            const overlay = document.getElementById('overlay');
            const btn = document.getElementById('btn-validate');

            if (data.customsDesc) {
                data.customs = {
                    includeCustomsDeclarations: 1,
                    contents: {
                        article: [{
                            description: data.customsDesc,
                            quantity: parseInt(data.customsQty || 1),
                            weight: parseFloat(data.customsWeight || data.packageWeight),
                            value: parseFloat(data.customsValue || 10),
                            originCountry: "FR",
                            currency: "EUR",
                            hsCode: data.customsHsCode || "000000"
                        }],
                        category: {
                            value: parseInt(data.customsCategory || 1)
                        }
                    }
                };
            }

            statusDiv.innerHTML = "";
            statusDiv.className = "";

            let firstInvalid = null;
            form.querySelectorAll('input, select, textarea').forEach(input => {
                if (input.hasAttribute('required') || input.hasAttribute('pattern')) {
                    const isValid = input.checkValidity();
                    let errorSpan = input.parentNode.querySelector('.validation-error-msg');

                    if (!isValid) {
                        input.classList.add('input-invalid');
                        if (!errorSpan) {
                            errorSpan = document.createElement('span');
                            errorSpan.className = 'validation-error-msg';
                            input.parentNode.appendChild(errorSpan);
                        }
                        errorSpan.textContent = input.validationMessage;
                        if (!firstInvalid) firstInvalid = input;
                    } else {
                        input.classList.remove('input-invalid');
                        if (errorSpan) errorSpan.remove();
                    }
                }
            });

            if (firstInvalid) {
                firstInvalid.focus();
                return;
            }

            localStorage.setItem('colissimoData', JSON.stringify(data));

            statusDiv.textContent = "Préparation du paiement...";
            btn.disabled = true;
            overlay.style.visibility = 'visible';

            try {
                const API_BASE_PAY = "https://generate-docs-production.up.railway.app";
                const res = await fetch(`${API_BASE_PAY}/create-payment?product_name=colissimo-inter`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        type_pdf: "colissimo",
                        ...data
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || "Erreur lors de la création du paiement");
                }

                const result = await res.json();
                if (result.payment_url) {
                    window.location.href = result.payment_url;
                } else {
                    throw new Error("Pas d'URL de paiement reçue");
                }
            } catch (error) {
                statusDiv.innerHTML = "<span class='error-message'>❌ Erreur: " + error.message + "</span>";
                btn.disabled = false;
                overlay.style.visibility = 'hidden';
            }
        }

        async function performGeneration(data) {
            const statusDiv = document.getElementById('message');
            const overlay = document.getElementById('overlay');
            const btn = document.getElementById('btn-validate');

            statusDiv.textContent = "Génération de l'étiquette...";
            overlay.style.visibility = 'visible';
            btn.disabled = true;

            try {
                const response = await fetch('https://transporteur.up.railway.app/generate/colissimo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: data })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    statusDiv.innerHTML = "<span class='success-message'>✅ Génération réussie !</span>";
                    if (result.label) {
                        const link = document.createElement("a");
                        link.href = `data:application/pdf;base64,${result.label}`;
                        link.download = `etiquette_expert_${result.parcelNumber || 'test'}.pdf`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }
                } else {
                    statusDiv.innerHTML = "<span class='error-message'>❌ Erreur: " + (result.message || "Erreur serveur") + "</span>";
                }
            } catch (error) {
                statusDiv.innerHTML = "<span class='error-message'>❌ Erreur réseau ou serveur.</span>";
            } finally {
                overlay.style.visibility = 'hidden';
                btn.disabled = false;
            }
        }

        function setupVisibilityToggle(radioName, divId) {
            const radios = document.getElementsByName(radioName);
            const targetDiv = document.getElementById(divId);

            if (!targetDiv) return;

            function update() {
                const checked = document.querySelector(`input[name="${radioName}"]:checked`);
                if (checked) {
                    targetDiv.style.display = (checked.value === "0") ? "block" : "none";
                }
            }

            radios.forEach(r => r.addEventListener('change', update));
            update();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('success')) {
                const savedData = localStorage.getItem('colissimoData');
                if (savedData) {
                    const data = JSON.parse(savedData);
                    localStorage.removeItem('colissimoData');
                    performGeneration(data);
                }
            }

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('shippingDate').value = today;

            setupVisibilityToggle('senderType', 'senderCompanyDiv');
            setupVisibilityToggle('receiverType', 'receiverCompanyDiv');

            fillDefaultSender();
        });
    </script>
