<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur QR ZIP | ChezRheyy Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>
    <div id="toast-container"></div>

    <div class="sidebar">
        <div class="logo"><i data-lucide="shield"></i> ChezRheyy <span>Admin</span></div>
        <nav>
            <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="payments.html" class="nav-item"><i data-lucide="credit-card"></i> Paiements</a>
            <a href="tools.html" class="nav-item"><i data-lucide="wrench"></i> Outils</a>
            <a href="mrz.html" class="nav-item"><i data-lucide="file-text"></i> MRZ</a>
            <a href="qr_zip.html" class="nav-item active"><i data-lucide="archive"></i> QR ZIP</a>
            <a href="packager.html" class="nav-item"><i data-lucide="package"></i> Packager 200</a>
            <a href="audio_matcher.html" class="nav-item"><i data-lucide="link"></i> Linker Audio</a>
            <a href="audio_analyse.html" class="nav-item"><i data-lucide="mic"></i> Analyse Audio</a>
        </nav>
    </div>

    <div class="main">
        <header>
            <div><h1>Générateur QR ZIP</h1><p>Création d'une archive contenant des codes QR personnalisés à la volée.</p></div>
            <button class="btn-logout" onclick="logout()">Déconnexion</button>
        </header>

        <div class="service-card" style="max-width: 600px;">
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px;">Une ligne par code QR à générer (ID, liens, etc.).</p>
            <textarea id="qrLines" placeholder="Ligne 1&#10;Ligne 2&#10;..." class="form-input" rows="8" style="margin-bottom: 20px; font-family: monospace;"></textarea>
            <button onclick="generateQR()" id="genBtn" class="btn-action">Générer l'archive ZIP</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
        const API_BASE = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") 
            ? "http://localhost:8080" 
            : "https://rheyy-services.up.railway.app";
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'index.html';

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            toast.innerHTML = `<i data-lucide="${icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        async function generateQR() {
            const lines = document.getElementById('qrLines').value.split('\n').filter(l => l.trim());
            if (lines.length === 0) { showToast("Veuillez entrer des données", "error"); return; }
            const btn = document.getElementById('genBtn');
            btn.innerText = "Compression..."; btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/generate-zip`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lines })
                });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = "qr_codes.zip"; a.click();
                    showToast("ZIP généré avec succès !");
                } else { throw new Error(); }
            } catch (err) { showToast("Erreur lors de la génération", "error"); }
            finally { btn.innerText = "Générer l'archive ZIP"; btn.disabled = false; }
        }

        function logout() { localStorage.removeItem('adminToken'); window.location.href = 'index.html'; }
    </script>
</body>

</html>
