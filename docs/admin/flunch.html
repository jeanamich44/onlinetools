<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flunch Control Center | Premium Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #08090a;
            --card-bg: #111418;
            --accent: #ffb703;
            --text-main: #e2e8f0;
            --terminal-bg: #0d0f14;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(17, 20, 24, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }

        /* IDE TERMINAL STYLE */
        .log-terminal {
            background: var(--terminal-bg);
            border: 1px solid #1f2937;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            padding: 1.5rem;
            position: relative;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            min-height: 500px;
            max-height: 65vh;
            overflow-y: auto;
        }

        .log-terminal::-webkit-scrollbar { width: 6px; }
        .log-terminal::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }

        .log-line { margin-bottom: 4px; border-left: 2px solid transparent; padding-left: 8px; }
        .log-line:hover { background: rgba(255,255,255,0.02); }

        .tag { font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-right: 8px; font-size: 0.75rem; }
        .tag-system { background: #3b82f633; color: #60a5fa; }
        .tag-auth { background: #f59e0b33; color: #fbbf24; }
        .tag-success { background: #10b98133; color: #34d399; }
        .tag-error { background: #ef444433; color: #f87171; }
        .tag-trace { background: #6b728033; color: #9ca3af; }

        .time { color: #4b5563; margin-right: 10px; font-size: 0.8rem; }

        /* BUTTONS & NAV */
        .nav-btn {
            padding: 10px 16px;
            border-radius: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .nav-btn.active { color: var(--accent); background: rgba(255, 183, 3, 0.1); border: 1px solid rgba(255, 183, 3, 0.2); }
        .nav-btn:hover:not(.active) { color: white; background: rgba(255,255,255,0.05); }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from {transform: rotate(0deg)} to {transform: rotate(360deg)} }

        .glow-accent { box-shadow: 0 0 20px rgba(255, 183, 3, 0.15); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <div class="bg-gradient-to-br from-yellow-400 to-orange-500 p-3 rounded-xl glow-accent">
                    <i data-lucide="zap" class="text-black fill-black"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Flunch Orchestrator <span class="text-yellow-500">v2.1</span></h1>
                    <p class="text-gray-500 text-sm">Contrôle de l'automate de fidélisation en temps réel</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="loadFiles()" id="btnRefresh" class="flex items-center gap-2 px-5 py-2.5 glass-panel hover:bg-gray-800 transition-all font-semibold">
                    <i data-lucide="refresh-cw" id="iconRefresh" class="w-4 h-4"></i> Actualiser
                </button>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-6">
            <!-- SIDEBAR CONTROL -->
            <aside class="col-span-12 lg:col-span-3 flex flex-col gap-4">
                <div class="glass-panel p-5">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Flux Système</h3>
                    <div class="flex flex-col gap-2">
                        <button onclick="switchTab('automation')" id="btn-automation" class="nav-btn active">
                            <i data-lucide="terminal" class="w-4 h-4"></i> Automation Logs
                        </button>
                        <button onclick="switchTab('mails')" id="btn-mails" class="nav-btn">
                            <i data-lucide="mail" class="w-4 h-4"></i> Historique Codes
                        </button>
                        <button onclick="switchTab('token')" id="btn-token" class="nav-btn">
                            <i data-lucide="key" class="w-4 h-4"></i> Jeton Actuel (JWT)
                        </button>
                    </div>
                </div>

                <div class="glass-panel p-5 bg-gradient-to-b from-transparent to-yellow-500/5">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Statut Session</h3>
                    <div id="status-display" class="flex items-center gap-3 text-sm text-yellow-400">
                        <div class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></div>
                        En attente d'instruction...
                    </div>
                    <hr class="my-4 border-gray-800">
                    <button class="w-full py-3 bg-red-500/10 text-red-500 border border-red-500/20 rounded-lg text-sm font-bold hover:bg-red-500 hover:text-white transition-all">
                        Arrêt d'Urgence
                    </button>
                </div>
            </aside>

            <!-- MAIN TERMINAL AREA -->
            <main class="col-span-12 lg:col-span-9">
                <div class="flex items-center justify-between mb-3 px-2">
                    <div class="flex items-center gap-2">
                        <div class="flex gap-1.5">
                            <div class="w-3 h-3 rounded-full bg-red-500/30"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/30"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/30"></div>
                        </div>
                        <span id="active-filename" class="text-xs text-gray-500 font-mono ml-4">automation.log</span>
                    </div>
                    <span class="text-xs text-gray-600 font-mono">SSH CONNECTED</span>
                </div>
                
                <div id="log-viewer" class="log-terminal">
                   <!-- Logs will be rendered here -->
                   <div class="flex items-center justify-center h-full text-gray-600 italic">Connexion au serveur Python...</div>
                </div>
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const API_BASE = window.location.origin.includes('localhost') ? 'http://localhost:8080' : window.location.origin;
        const token = localStorage.getItem('token');
        let currentTab = 'automation';
        let filesData = {};

        async function loadFiles() {
            const btn = document.getElementById('iconRefresh');
            btn.classList.add('spin');
            
            try {
                const res = await fetch(`${API_BASE}/admin/flunch/files`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                filesData = await res.json();
                renderContent();
                document.getElementById('status-display').innerHTML = `<div class="w-2 h-2 rounded-full bg-green-500"></div> Données à jour`;
            } catch (err) {
                console.error(err);
                document.getElementById('status-display').innerHTML = `<div class="w-2 h-2 rounded-full bg-red-500"></div> Erreur Backend`;
            } finally {
                setTimeout(() => btn.classList.remove('spin'), 500);
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${tab}`).classList.add('active');
            document.getElementById('active-filename').innerText = tab === 'automation' ? 'automation.log' : (tab === 'mails' ? 'mails_recus.txt' : 'bearer_token.txt');
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('log-viewer');
            const data = filesData[currentTab] || "Aucune donnée disponible.";
            
            if (currentTab === 'token') {
                container.innerHTML = `<div class="p-6 bg-yellow-500/5 border border-yellow-500/20 rounded-lg break-all text-yellow-100">${data}</div>`;
                return;
            }

            const lines = data.split('\n').filter(l => l.trim().length > 0);
            container.innerHTML = lines.map(line => {
                let tagClass = 'tag-trace';
                let tagName = 'INFO';
                
                if (line.includes('[SYSTEM]')) { tagClass = 'tag-system'; tagName = 'SYSTEM'; }
                if (line.includes('[AUTH]') || line.includes('[A2F]')) { tagClass = 'tag-auth'; tagName = 'AUTH'; }
                if (line.includes('[SUCCESS]')) { tagClass = 'tag-success'; tagName = 'SUCCESS'; }
                if (line.includes('[ERROR]') || line.includes('[CRITICAL]')) { tagClass = 'tag-error'; tagName = 'ERROR'; }
                
                // Extraction du timestamp s'il existe
                const timeMatch = line.match(/\[(\d{1,2}:\d{2}:\d{2} [AP]M)\]/);
                const timeStr = timeMatch ? timeMatch[1] : '';
                const cleanLine = line.replace(/\[.*?\]/g, '').trim();

                return `
                    <div class="log-line">
                        <span class="time">${timeStr}</span>
                        <span class="tag ${tagClass}">${tagName}</span>
                        <span class="content">${cleanLine}</span>
                    </div>
                `;
            }).join('');

            // Auto-scroll au bas
            container.scrollTop = container.scrollHeight;
        }

        // Auto load every 5 seconds if automation tab active
        setInterval(() => {
            if (currentTab === 'automation') loadFiles();
        }, 5000);

        // Initial load
        window.onload = loadFiles;
    </script>
</body>
</html>
