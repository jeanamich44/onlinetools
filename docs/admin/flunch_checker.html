<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flunch Bulk Checker | ChezRheyy Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        .checker-container {
            background: #111827;
            border-radius: 16px;
            border: 1px solid #1f2937;
            padding: 25px;
            margin-top: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .results-table { display: none; }
        #results-text {
            width: 100%;
            min-height: 400px;
            background: #000;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #10b981;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="toast-container" aria-live="polite"></div>
    
    <div class="sidebar">
        <div class="logo">
            <i data-lucide="shield" aria-hidden="true"></i> ChezRheyy <span>Admin</span>
        </div>
        <nav aria-label="Navigation principale">
            <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></a>
            <a href="payments.html" class="nav-item"><i data-lucide="credit-card"></i> <span>Paiements</span></a>
            <a href="flunch_token.html" class="nav-item"><i data-lucide="key"></i> <span>Flunch Token</span></a>
            <a href="flunch_checker.html" class="nav-item active" aria-current="page"><i data-lucide="search"></i> <span>Flunch Checker</span></a>
            <a href="mrz.html" class="nav-item"><i data-lucide="file-text"></i> <span>MRZ</span></a>
            <a href="qr_zip.html" class="nav-item"><i data-lucide="archive"></i> <span>QR ZIP</span></a>
            <a href="packager.html" class="nav-item"><i data-lucide="package"></i> <span>Packager 200</span></a>
            <a href="audio_matcher.html" class="nav-item"><i data-lucide="link"></i> <span>Linker Audio</span></a>
            <a href="audio_analyse.html" class="nav-item"><i data-lucide="mic"></i> <span>Analyse Audio</span></a>
        </nav>
    </div>

    <div class="main">
        <header>
            <div class="header-content">
                <h1>Flunch Bulk Checker</h1>
                <p>Vérification groupée des comptes et soldes fidélité.</p>
            </div>
            <button class="btn-logout" onclick="logout()">Déconnexion</button>
        </header>

        <section class="checker-container">
            <div style="margin-bottom: 25px;">
                <label for="ids-input" style="display: block; margin-bottom: 12px; color: #9ca3af; font-size: 0.95rem; font-weight: 600;">Liste des IDs Clients</label>
                <textarea id="ids-input" class="form-input" placeholder="FR123456789, FR987654321..."></textarea>
                <p style="margin-top: 8px; font-size: 0.8rem; color: #4b5563;">Séparez les IDs par des virgules ou des retours à la ligne.</p>
            </div>
            
            <button onclick="startBulkCheck()" id="btnCheck" class="btn-action" style="width: auto; padding: 0 32px; height: 48px; background: var(--primary);">
                <i data-lucide="play" style="width:20px; margin-right:10px;"></i> <span>Lancer la vérification</span>
            </button>

            <div id="results-area" style="display: none; margin-top: 40px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #1f2937; padding-bottom: 15px;">
                    <h3 style="margin: 0; display: flex; align-items: center; gap: 12px; color: #fff;">
                        <i data-lucide="list" style="color: var(--primary);"></i> Résultats de l'analyse (Format TXT)
                    </h3>
                    <button onclick="copyResults()" class="btn-action" style="width:auto; height:32px; font-size:0.75rem; background: #1f2937; border-color: #374151;">
                        <i data-lucide="copy" style="width:14px; margin-right:5px;"></i> Copier tout
                    </button>
                    <div id="check-stats" style="font-size: 0.85rem; color: #9ca3af; font-family: 'JetBrains Mono';"></div>
                </div>
                
                <div id="results-text"></div>
            </div>
        </section>
    </div>

    <script>
        lucide.createIcons();
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || !window.location.hostname || window.location.protocol === "file:";
        const API_BASE = isLocal ? 'http://localhost:8080' : "https://rheyy-services.up.railway.app";
        const token = localStorage.getItem('adminToken');
        
        if (!isLocal && !token) window.location.href = 'index.html';

        async function startBulkCheck() {
            const input = document.getElementById('ids-input');
            const ids = input.value.trim();
            if (!ids) {
                showToast("Veuillez entrer au moins un ID", "error");
                return;
            }

            const btn = document.getElementById('btnCheck');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="refresh-cw" class="spin" style="width:20px; margin-right:10px;"></i> Vérification en cours...';
            lucide.createIcons();

            try {
                const res = await fetch(`${API_BASE}/admin/flunch/check`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ ids: ids })
                });

                if (!res.ok) throw new Error("Erreur serveur");

                const data = await res.json();
                displayResults(data.results);
                showToast("Vérification terminée avec succès !");
            } catch (err) {
                showToast(err.message || "Erreur lors de la requête", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="play" style="width:20px; margin-right:10px;"></i> Lancer la vérification';
                lucide.createIcons();
            }
        }

        function displayResults(results) {
            const area = document.getElementById('results-area');
            const container = document.getElementById('results-text');
            const stats = document.getElementById('check-stats');
            
            area.style.display = 'block';
            let output = "";
            let valids = 0;

            results.forEach(res => {
                const d = res.data || {};
                const isError = d.status === "error" || d.error || (!d.firstName && !d.balance);
                
                if (isError) {
                    output += `${res.id} | ERREUR: ${d.message || d.detail || 'Identifiants invalides'}\n`;
                } else {
                    valids++;
                    
                    // Construction de la ligne selon l'exemple EXACT fourni
                    let lineParts = [];
                    lineParts.push(res.id); // Premier ID sans label selon exemple
                    
                    if (res.id) lineParts.push(`ID = ${res.id}`);
                    if (d.loyaltyCardNumber || d.cardId) lineParts.push(`CARTE = ${d.loyaltyCardNumber || d.cardId}`);
                    if (d.balance !== undefined) lineParts.push(`SOLDE = ${d.balance}`);
                    if (d.registrationDate) lineParts.push(`START = ${d.registrationDate}`);
                    if (d.lastName) lineParts.push(`NOM = ${d.lastName}`);
                    if (d.firstName) lineParts.push(`PRENOM = ${d.firstName}`);
                    if (d.birthDate) lineParts.push(`DDN = ${d.birthDate}`);
                    if (d.emailAddress || d.email) lineParts.push(`MAIL = ${d.emailAddress || d.email}`);
                    if (d.zipCode || d.cp) lineParts.push(`CP = ${d.zipCode || d.cp}`);
                    if (d.city) lineParts.push(`VILLE = ${d.city}`);
                    if (d.addressLine1 || d.address) lineParts.push(`ADRESSE = ${d.addressLine1 || d.address}`);
                    if (d.type || d.loyaltyProgramCode) lineParts.push(`TYPE = ${d.type || d.loyaltyProgramCode}`);

                    output += lineParts.join(' | ') + "\n";
                }
            });
            
            container.innerText = output;
            stats.innerText = `${valids} valide(s) / ${results.length} total`;
        }

        function copyResults() {
            const text = document.getElementById('results-text').innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast("Copié dans le presse-papier !");
            });
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type} show`;
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            toast.innerHTML = `<i data-lucide="${icon}" aria-hidden="true"></i><span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { 
                toast.classList.remove('show'); 
                setTimeout(() => toast.remove(), 400); 
            }, 4000);
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
