<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>RIB – La Banque Postale</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .btn-premium-bank {
            position: relative;
            background: linear-gradient(135deg, #1e40af 0%, #111827 100%);
            width: 100%;
            color: #f3f4f6;
            border: 1px solid rgba(59, 130, 246, 0.3);
            /* --- TAILLE DU BOUTON ICI (Padding: haut/bas gauche/droite) --- */
            padding: 14px; 
            border-radius: 12px;
            cursor: pointer;
            /* --- TAILLE DU TEXTE ICI --- */
            font-size: 1.1rem; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-premium-bank:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .btn-premium-bank:active {
            transform: translateY(1px);
        }

        .btn-premium-bank::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0) 40%,
                rgba(255, 255, 255, 0.2) 50%,
                rgba(255, 255, 255, 0) 60%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(45deg);
            transition: all 0.5s;
            animation: shine-bank 4s infinite linear;
        }

        @keyframes shine-bank {
            0% { transform: translateX(-150%) rotate(45deg); }
            100% { transform: translateX(150%) rotate(45deg); }
        }

        .btn-premium-bank:disabled {
            background: #1f2937;
            border-color: #374151;
            color: #6b7280;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>

<body>

  <div id="overlay" style="display: flex; flex-direction: column; gap: 20px;">
    <div class="spinner"></div>
    <div id="timerContainer" style="display:none; text-align: center; color: #fff;">
      <span style="font-size: 1.2rem; font-weight: bold;" id="timer">00:00</span>
      <span class="info-icon" style="margin-left: 10px; vertical-align: middle;"
        data-tooltip="La génération peut prendre quelques instants, veuillez rester sur la page.">i</span>
    </div>
  </div>


  <header class="top-bar">
    <div class="top-bar-inner">
      <span class="logo" id="logo">ChezRheyy</span>

    </div>
  </header>

  <div class="container">
    <h1>RIB LBP</h1>
    <p class="subtitle">Génération PDF – La Banque Postale</p>

    <form id="ribForm">
      
      <input name="nom_prenom" placeholder="Nom Prénom">
      <div id="error-nom"
        style="color: #dc3545; font-size: 0.85rem; margin-top: -12px; margin-bottom: 12px; display: none; text-align: left; font-weight: bold;">
        ⚠️ Le nom et prénom sont obligatoires pour le PDF final.</div>

      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <input name="cp" placeholder="Code Postal" style="flex: 1; margin-bottom: 0;">
        <input name="ville" placeholder="Ville" style="flex: 2; margin-bottom: 0;">
      </div>
      <input name="adresse" placeholder="Adresse">

      
      <input name="banque" placeholder="Banque">
      <input name="guichet" placeholder="Guichet">
      <input name="compte" placeholder="Compte">
      <input name="cle" placeholder="Clé">
      <input name="iban" placeholder="IBAN">
      <input name="bic" placeholder="BIC">

      <button type="submit" class="btn-premium-bank">Générer Preview (Gratuit)</button>
    </form>

    <script src="../js/chronopost-autocomplete.js"></script>

    <div id="message"></div>
    <div style="margin-top: 20px; border-top: 1px solid #ccc; padding-top: 20px;">
      <p style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">Le PDF final sans filigrane est payant (1€).</p>
      <button id="btn-pay-submit" type="button" class="btn-premium-bank">Acheter le PDF Final (1€)</button>
    </div>
    <a class="back" href="./rib-generator.html">Retour</a>
  </div>

  <script>


    const bar = document.querySelector(".top-bar");
    const inner = document.querySelector(".top-bar-inner");

    bar.style.position = "fixed";
    bar.style.top = "0";
    bar.style.left = "0";
    bar.style.width = "100%";
    bar.style.zIndex = "1000";

    inner.style.display = "flex";
    inner.style.alignItems = "center";
    inner.style.justifyContent = "space-between";
    inner.style.padding = "12px 24px";

    const logo = document.getElementById("logo");
    logo.onclick = () => window.location.href = "../index.html";

    const API_BASE = "https://generate-docs-production.up.railway.app";
    const ribForm = document.getElementById("ribForm");
    const message = document.getElementById("message");
    const btnPay = document.getElementById("btn-pay-submit");
    const errorNom = document.getElementById("error-nom");
    const inputNom = document.getElementsByName("nom_prenom")[0];


    btnPay.onclick = async () => {
      const formData = Object.fromEntries(new FormData(ribForm).entries());

      if (!formData.nom_prenom) {
        errorNom.style.display = "block";
        inputNom.style.borderColor = "#dc3545";
        inputNom.focus();
        return;
      }

      errorNom.style.display = "none";
      inputNom.style.borderColor = "";

      message.textContent = "Préparation du paiement...";
      message.className = "";

      const overlay = document.getElementById("overlay");
      overlay.style.visibility = "visible";

      try {
        const payload = {
          type_pdf: "lbp",
          ...formData
        };

        const res = await fetch(`${API_BASE}/create-payment?product_name=rib-lbp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Erreur lors de la création du paiement");
        }

        const data = await res.json();
        const ref = data.checkout_ref;

        if (data.payment_url) {

          window.open(data.payment_url, "_blank");

          message.textContent = "Paiement en cours... Restez sur cette page, le téléchargement débutera automatiquement après validation.";
          message.style.color = "#3498db";

          while (true) {
            try {
              const waitRes = await fetch(`${API_BASE}/api/wait-for-success/${ref}`);
              const waitData = await waitRes.json();

              if (waitData.status === "SUCCESS") {
                message.textContent = "✅ Paiement validé ! Téléchargement en cours...";
                message.style.color = "#28a745";

                if (overlay) overlay.style.visibility = "hidden";

                window.location.href = `${API_BASE}/api/download-pdf/${ref}`;
                break;
              } else if (waitData.status === "TIMEOUT") {
                continue; // Relance après le timeout du serveur/proxy
              } else {
                throw new Error("Le paiement a échoué ou a été annulé.");
              }
            } catch (pollErr) {
              console.error("Polling error:", pollErr);
              await new Promise(r => setTimeout(r, 2000));
              continue; // On insiste
            }
          }

        } else {
          throw new Error("Pas d'URL de paiement reçue");
        }
      } catch (err) {
        message.textContent = "Erreur Paiement: " + err.message;
        message.className = "error";
      }
    };


    ribForm.onsubmit = async (e) => {
      e.preventDefault();

      const overlay = document.getElementById("overlay");
      overlay.style.visibility = "visible";
      const timerSpan = document.getElementById("timer");
      const timerContainer = document.getElementById("timerContainer");

      timerContainer.style.display = "block";
      let seconds = 0;
      timerSpan.textContent = "00:00";
      let timerInterval = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        timerSpan.textContent = `${m}:${s}`;
      }, 1000);

      await new Promise(resolve => setTimeout(resolve, 100));

      message.textContent = "";
      message.className = "";

      const formData = Object.fromEntries(new FormData(ribForm).entries());

      const payload = {
        type_pdf: "lbp",
        preview: true,
        ...formData
      };

      try {
        const res = await fetch(`${API_BASE}/generate-pdf`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Erreur serveur");
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;

        const extension = blob.type === "image/jpeg" ? "jpg" : "pdf";
        a.download = `preview_lbp.${extension}`;
        document.body.appendChild(a);
        a.click();
        a.remove();

        message.textContent = "Preview générée ! Vérifiez vos infos avant de payer.";
        message.className = "success";

      } catch (err) {
        message.textContent = err.message;
        message.className = "error";
      } finally {
        overlay.style.visibility = "hidden";
        if (timerInterval) clearInterval(timerInterval);
        if (timerContainer) timerContainer.style.display = "none";
      }
    };



  </script>

</body>

</html>
